# HTTP → HTTPS redirect
server {
    listen 80;
    server_name powerdevreview.com www.powerdevreview.com;

    return 301 https://$host$request_uri;
}

# HTTPS main app
server {
    listen 443 ssl http2;
    server_name powerdevreview.com www.powerdevreview.com;

    ssl_certificate /etc/letsencrypt/live/powerdevreview.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/powerdevreview.com/privkey.pem;

    root /srv/app/public;
    index index.php index.html;

    # Allow larger uploads (optional)
    client_max_body_size 100M;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handling
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Important for Laravel HTTPS detection
        fastcgi_param HTTPS on;
    }

    # Static files (performance boost)
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|webp)$ {
        try_files $uri =404;
        expires max;
        access_log off;
    }
}